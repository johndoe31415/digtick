module = digtick

[test.env_vars]
UNITTEST_RUN_ALL = 0

[coverage]
pass

[linter.disable]
src.digtick.tpg:*:*
src.digtick.__main__:main.genparser:function-redefined
src.digtick.ExpressionParser:ParseTreeElement.collect_minterms:no-member
src.digtick.ExpressionParser:ParseTreeElement.collect_maxterms:no-member
src.digtick.ExpressionParser:ParseTreeElement.collect_literals:no-member
src.digtick.ExpressionParser:ParseTreeElement._is_mterm:no-member
src.digtick.ExpressionParser:ParseTreeElement.table:no-member
src.digtick.DigitalTimingDiagram:DigitalTimingDiagram._layer:method-cache-max-size-none

src.digtick.FriendlyArgumentParser:*:*
src.digtick.MultiCommand:*:*
src.digtick.PrefixMatcher:*:*

*:*:missing-function-docstring
*:*:missing-module-docstring
*:*:missing-class-docstring
*:*:invalid-name
*:*:duplicate-code
*:*:too-few-public-methods
*:*:superfluous-parens
*:*:too-many-arguments
*:*:protected-access
*:*:multiple-statements
*:*:too-many-branches
*:*:too-many-public-methods
*:*:attribute-defined-outside-init
*:*:unspecified-encoding
*:*:unused-variable
*:*:fixme
*:*:unused-argument
*:*:too-many-instance-attributes
*:*:no-else-return
*:*:arguments-renamed
*:*:redefined-outer-name
*:*:too-many-locals
*:*:no-else-raise
*:*:broad-except
*:*:too-many-nested-blocks
*:*:useless-super-delegation
*:*:consider-using-max-builtin

[linter.enable]
*:*:unused-import
*:*:raise-missing-from
*:*:anomalous-backslash-in-string
*:*:wrong-import-order
*:*:inconsistent-return-statements
*:*:logging-fstring-interpolation
*:*:f-string-without-interpolation
*:*:consider-using-max-builtin
*:*:subprocess-run-check

# vim:syntax=dosini
