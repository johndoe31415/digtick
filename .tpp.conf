lint_module = digtick
test_module = digtick.tests

[test.env_vars]
UNITTEST_RUN_ALL = 1

[coverage.ignore]
src/digtick/tpg.py

# These files are all from my pycommon library
src/digtick/FriendlyArgumentParser.py
src/digtick/MultiCommand.py
src/digtick/PrefixMatcher.py
src/digtick/RandomDist.py
src/digtick/TableFormatter.py

# These may be locally installed in my case
*/pysvgedit/*

[coverage.scripts]
scripts/command_line_coverage.py

[linter.disable]
src.digtick.tpg:*:*
src.digtick.__main__:main.genparser:function-redefined
src.digtick.ExpressionParser:ParseTreeElement.collect_minterms:no-member
src.digtick.ExpressionParser:ParseTreeElement.collect_maxterms:no-member
src.digtick.ExpressionParser:ParseTreeElement.collect_literals:no-member
src.digtick.ExpressionParser:ParseTreeElement._is_mterm:no-member
src.digtick.ExpressionParser:ParseTreeElement.table:no-member
src.digtick.DigitalTimingDiagram:DigitalTimingDiagram._layer:method-cache-max-size-none
src.digtick.Enums:TableFormat.parse_options:no-member

src.digtick.FriendlyArgumentParser:*:*
src.digtick.MultiCommand:*:*
src.digtick.PrefixMatcher:*:*

*:*:missing-function-docstring
*:*:missing-module-docstring
*:*:missing-class-docstring
*:*:invalid-name
*:*:duplicate-code
*:*:too-few-public-methods
*:*:superfluous-parens
*:*:too-many-arguments
*:*:protected-access
*:*:multiple-statements
*:*:too-many-branches
*:*:too-many-public-methods
*:*:attribute-defined-outside-init
*:*:unspecified-encoding
*:*:unused-variable
*:*:fixme
*:*:unused-argument
*:*:too-many-instance-attributes
*:*:no-else-return
*:*:arguments-renamed
*:*:redefined-outer-name
*:*:too-many-locals
*:*:no-else-raise
*:*:broad-except
*:*:too-many-nested-blocks
*:*:useless-super-delegation
*:*:consider-using-max-builtin

[linter.enable]
*:*:unused-import
*:*:raise-missing-from
*:*:anomalous-backslash-in-string
*:*:wrong-import-order
*:*:inconsistent-return-statements
*:*:logging-fstring-interpolation
*:*:f-string-without-interpolation
*:*:consider-using-max-builtin
*:*:subprocess-run-check

# vim:syntax=dosini
