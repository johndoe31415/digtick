name: tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install Python code quality tools
        run: |
          pip3 install coverage pylint
          git clone --depth 1 https://github.com/johndoe31415/jbin

      - name: Install digtick in venv, test and ensure linting works
        run: |
          pip3 install .
          UNITTEST_RUN_ALL="1" python3 -m unittest digtick.tests
          jbin/tpp -l

      - name: Install digtick editable so coverage paths look nice
        run: pip3 install -e .

      - name: Run testcases and determine coverage
        run: UNITTEST_RUN_ALL="1" coverage run --source digtick --omit "tpg.py,PrefixMatcher.py,RandomDist.py,TableFormatter.py,MultiCommand.py" -m unittest digtick.tests

      - name: Determine coverage for the CLI tools
        run: scripts/command_line_coverage

      - name: Create coverage output file
        run: coverage xml

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          format: cobertura
          file: coverage.xml
