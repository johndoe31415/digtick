name: tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install Python code quality tools
        run: |
          pip3 install coverage pylint
          git clone --depth 1 https://github.com/johndoe31415/jbin

      - name: Install digtick in venv and test to make sure it works as system package
        run: |
          pip3 install .
          UNITTEST_RUN_ALL="1" python3 -m unittest digtick.tests

      # When measuring coverage and the package is installed as system package,
      # the absolute paths show up in the coverage report. This is ugly.
      # Install editable so we get paths as expected for coverage measurement.
      # Also for linting, the suppressions refer to relative paths and
      # false-positives will show up when not in editable mode.
      - name: Reinstall digtick as editable package
        run: pip3 install -e .

      - name: Lint code, fail if there are linter errors
        run: jbin/tpp -l

      - name: Run testcases and determine coverage
        run: UNITTEST_RUN_ALL="1" coverage run --source digtick --omit=tpg.py,PrefixMatcher.py,RandomDist.py,TableFormatter.py,MultiCommand.py,FriendlyArgumentParser.py -m unittest digtick.tests

      - name: Determine coverage for the CLI tools
        run: scripts/command_line_coverage

      - name: Create coverage output file
        run: |
          coverage report
          coverage xml

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          format: cobertura
          file: coverage.xml
